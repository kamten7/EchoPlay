version: '3.8'

# ============================================
# 开发环境 Docker Compose
# ============================================
# 使用方式：
#   启动中间件：  docker compose -f docker-compose.dev.yml up -d
#   停止中间件：  docker compose -f docker-compose.dev.yml down
#   查看状态：    docker compose -f docker-compose.dev.yml ps
#
# 说明：
#   - 只启动 MySQL、Redis、MinIO 三个中间件
#   - Spring Boot 应用从 IDE 直接运行（端口 7070 / 7071）
#   - IDE 运行时会自动连接 localhost:3306 / localhost:6379 / localhost:9000
#   - application.yml 中的默认值已指向 127.0.0.1，开发时无需额外配置
# ============================================

services:
  # ==================== MySQL 8.0 ====================
  mysql:
    image: mysql:8.0
    container_name: mvp-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: my_video_platform
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=500
      --wait_timeout=28800
      --interactive_timeout=28800
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - mvp-network

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: mvp-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - mvp-network

  # ==================== MinIO（对象存储）====================
  minio:
    image: minio/minio:latest
    container_name: mvp-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - mvp-network

  # ==================== MinIO 初始化（自动创建 bucket）====================
  minio-init:
    image: minio/mc:latest
    container_name: mvp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set mvp http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb --ignore-existing mvp/my_video_platform;
      /usr/bin/mc anonymous set download mvp/my_video_platform;
      echo 'MinIO bucket 初始化完成';
      exit 0;
      "
    networks:
      - mvp-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  mvp-network:
    driver: bridge
