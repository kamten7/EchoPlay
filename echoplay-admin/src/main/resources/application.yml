server:
  port: 7070
spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB
  application:
    name: my-video-platform-admin
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3310}/echoplay?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf8&autoReconnect=true&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:echoplay}
    password: ${DB_PASSWORD:your_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: HikariCPDatasource
      minimum-idle: 5
      idle-timeout: 180000
      maximum-pool-size: 10
      auto-commit: true
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  redis:
    database: 0
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    jedis:
      pool:
        max-active: 20
        max-wait: -1
        max-idle: 10
        min-idle: 0
    timeout: 2000
#mybatis 大小写转驼峰
mybatis:
  mapper-locations: classpath*:com/mappers/*.xml
  type-aliases-package: com.echoplay.entity.po
  configuration:
    map-underscore-to-camel-case: true

project:
  folder: ${PROJECT_FOLDER:d:/webser/echoplay/}
log:
  root:
    level: ${LOG_LEVEL:debug}
admin:
  account: ${ADMIN_ACCOUNT:admin}
  password: ${ADMIN_PASSWORD:admin123}

minio:
  endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
  access-key: ${MINIO_ROOT_USER:minioadmin}
  secret-key: ${MINIO_ROOT_PASSWORD:minioadmin}
  bucket-name: ${MINIO_BUCKET_NAME:echoplay}

oss:
  endpoint: ${OSS_ENDPOINT:oss-cn-shenzhen.aliyuncs.com}
  accessKeyId: ${OSS_ACCESS_KEY_ID:}
  accessKeySecret: ${OSS_ACCESS_KEY_SECRET:}
  bucketName: ${OSS_BUCKET:}
  pathPrefix: ${OSS_PATH_PREFIX:}

management:
  health:
    elasticsearch:
      enabled: false