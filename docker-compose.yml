version: '3.8'

services:
  # ==================== MySQL 8.0 ====================
  mysql:
    image: mysql:8.0
    container_name: mvp-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: my_video_platform
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=500
      --wait_timeout=28800
      --interactive_timeout=28800
    networks:
      - mvp-network

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: mvp-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mvp-network

  # ==================== MinIO ====================
  minio:
    image: minio/minio:latest
    container_name: mvp-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - mvp-network

  # ==================== MinIO 初始化桶和策略 ====================
  minio-init:
    image: minio/mc:latest
    container_name: mvp-minio-init
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set mvp http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb --ignore-existing mvp/my_video_platform;
      /usr/bin/mc anonymous set download mvp/my_video_platform;
      exit 0;
      "
    networks:
      - mvp-network

  # ==================== 用户端 API (my_video_platform-web) ====================
  my_video_platform-web:
    build:
      context: .
      dockerfile: my_video_platform-web/Dockerfile
    container_name: mvp-web
    restart: always
    ports:
      - "7071:7071"
    environment:
      DOCKER_ENV: "true"
      TZ: Asia/Shanghai
      LANG: zh_CN.UTF-8
      # MySQL
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # MinIO
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      # 阿里云 OSS（按需填写，留空则不启用）
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_PATH_PREFIX: ${OSS_PATH_PREFIX:-}
      # 项目配置
      PROJECT_FOLDER: /app/data
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      # 文件存储目录（Windows 宿主机映射）
      - ${WINDOWS_PROJECT_DIR:-D:/webser/my_video_platform}:/app/data
      # 日志输出
      - ./logs/web:/app/logs
    depends_on:
      - mysql
      - redis
      - minio
    networks:
      - mvp-network

  # ==================== 管理端 API (my_video_platform-admin) ====================
  my_video_platform-admin:
    build:
      context: .
      dockerfile: my_video_platform-admin/Dockerfile
    container_name: mvp-admin
    restart: always
    ports:
      - "7070:7070"
    environment:
      DOCKER_ENV: "true"
      TZ: Asia/Shanghai
      LANG: zh_CN.UTF-8
      # MySQL
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # MinIO
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
      # 阿里云 OSS（按需填写，留空则不启用）
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_PATH_PREFIX: ${OSS_PATH_PREFIX:-}
      # 项目配置
      PROJECT_FOLDER: /app/data
      ADMIN_ACCOUNT: ${ADMIN_ACCOUNT:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      # 文件存储目录（Windows 宿主机映射）
      - ${WINDOWS_PROJECT_DIR:-D:/webser/my_video_platform}:/app/data
      # 日志输出
      - ./logs/admin:/app/logs
    depends_on:
      - mysql
      - redis
      - minio
    networks:
      - mvp-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  mvp-network:
    driver: bridge