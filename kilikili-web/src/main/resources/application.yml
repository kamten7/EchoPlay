server:
  port: 7071
spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 150MB
  application:
    name: kilikili-web
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/kilikili?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf8&autoReconnect=true&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:your_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: HikariCPDatasource
      minimum-idle: 5
      idle-timeout: 180000
      maximum-pool-size: 10
      auto-commit: true
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  redis:
    database: 0
    host: 127.0.0.1
    port: 6379
    jedis:
      pool:
        max-active: 20
        max-wait: -1
        max-idle: 10
        min-idle: 0
    timeout: 2000
#mybatis 大小写转驼峰
mybatis:
  mapper-locations: classpath*:com/mappers/*.xml
  type-aliases-package: com.kilikili.entity.po
  configuration:
    map-underscore-to-camel-case: true

project:
  folder: d:/webser/kilikili/
ffmpeg:
  path: C:/Program Files (x86)/ACLOS/Cross/recorder-release/ffmpeg.exe
log:
  root:
    level: debug

minio:
  endpoint: http://127.0.0.1:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: kilikili

oss:
  endpoint: oss-cn-shenzhen.aliyuncs.com
  accessKeyId: ${OSS_ACCESS_KEY_ID}
  accessKeySecret: ${OSS_ACCESS_KEY_SECRET}
  bucketName: ${OSS_BUCKET_NAME:your-bucket}

management:
  health:
    elasticsearch:
      enabled: false
